    .header .meta .pill{padding:3px 12px;border-radius:6px;background:var(--accent-soft);color:var(--accent);font-weight:600}

    .post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;overflow:hidden;transition:border-color .2s}

    .post-card .post-header .badge.action{background:rgba(239,68,68,0.1);color:#ef4444}

    .post-card .post-body .cta-row .hashtags{font-size:.78em;color:var(--ink-dim);display:flex;gap:4px;flex-wrap:wrap}
    .post-card .post-body .cta-row .hashtags span{color:var(--blue);cursor:pointer}

    .filter-btn{padding:6px 16px;border-radius:8px;font-size:.82em;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--ink-muted);transition:all .2s;font-family:var(--font)}

    .filter-btn.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}

    .footer{text-align:center;padding:30px 0;color:var(--ink-dim);font-size:.82em;border-top:1px solid var(--border);margin-top:40px}
    .footer a{color:var(--blue);text-decoration:none}

  </style>
</head>

// ===== RENDER =====
let currentFilter = 'all';

function filterPosts(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-filter="${filter}"]`).classList.add('active');
  renderPosts();
}

function renderPosts() {
  const container = document.getElementById('postsContainer');
  const filtered = currentFilter === 'all' ? POSTS : POSTS.filter(p => p.type === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--ink-dim);"><span style="font-size:2em;display:block;margin-bottom:12px;">📭</span><h3>Chưa có bài viết nào</h3></div>';
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(p => {
    if (!groups[p.date]) groups[p.date] = [];
    groups[p.date].push(p);
  });
  const sortedDates = Object.keys(groups).sort().reverse();

  let html = '';
  sortedDates.forEach(date => {
    const parts = date.split('-');
    const days = ['Chủ nhật','Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7'];
    const d = new Date(parts[0], parts[1]-1, parts[2]);
    const dateStr = `${days[d.getDay()]}, ${parts[2]}/${parts[1]}/${parts[0]}`;

    html += `<div style="margin-bottom:8px;font-size:.82em;color:var(--ink-dim);font-weight:600;padding:8px 0 4px;">📅 ${dateStr} (${groups[date].length} bài)</div>`;

    groups[date].forEach((p, idx) => {
      html += `
        <div class="post-card" data-type="${p.type}">
          <div class="post-header">
            <div class="avatar">${p.type === 'tip' ? '💡' : p.type === 'stat' ? '📊' : p.type === 'story' ? '📖' : p.type === 'question' ? '❓' : '🎯'}</div>
            <div class="info">
              <div class="name">${p.title}</div>
              <div class="time">${p.date}</div>
            </div>
            <span class="badge ${p.type}">${p.label}</span>
          </div>
          <div class="post-body">
            <div class="content">${p.content}</div>
            <div class="cta-row">
              <span class="btn" onclick="copyPost(${p.id})">📋 Copy bài viết</span>
              <div class="hashtags">${p.hashtags.map(h => `<span>${h}</span>`).join(' ')}</div>
            </div>
          </div>
          <div class="post-footer">
            <span>💬 ${p.cta}</span>
            <span style="margin-left:auto;">
              <button class="copy-btn" onclick="copyPost(${p.id})">📋 Copy</button>
            </span>
          </div>
        </div>`;
    });
  });

  container.innerHTML = html;
}

function copyPost(id) {
  const post = POSTS.find(p => p.id === id);
  if (!post) return;

  const text = `${post.content}\n\n---\n${post.cta}`;
  navigator.clipboard.writeText(text).then(() => {
    // Visual feedback
    const btn = document.querySelector(`.copy-btn[onclick="copyPost(${id})"]`);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✅ Đã copy!';
      setTimeout(() => btn.textContent = orig, 2000);
    }
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ Đã copy nội dung! Hãy paste vào Facebook.');
  });
}

// Init
renderPosts();
</script>
