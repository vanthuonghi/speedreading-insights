<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Reading Insights - Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:#0a0a1a;color:#e4e4f0;line-height:1.7;min-height:100vh}
        .bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1}
        .bg-grid{position:fixed;top:0;left:0;right:0;bottom:0;
            background-image:linear-gradient(rgba(99,102,241,0.03)1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,0.03)1px,transparent 1px);
            background-size:60px 60px;z-index:-1}
        .g1{position:fixed;top:-20%;right:-10%;width:600px;height:600px;
            background:radial-gradient(circle,rgba(99,102,241,0.08),transparent 70%);border-radius:50%;z-index:-1;animation:f 20s ease-in-out infinite}
        .g2{position:fixed;bottom:-20%;left:-10%;width:500px;height:500px;
            background:radial-gradient(circle,rgba(168,85,247,0.06),transparent 70%);border-radius:50%;z-index:-1;animation:f 25s ease-in-out infinite reverse}
        @keyframes f{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(30px,-30px)scale(1.05)}66%{transform:translate(-20px,20px)scale(0.95)}}

        /* Dashboard header */
        header{text-align:center;padding:50px 20px 20px}
        header .logo{font-size:3em;display:block;margin-bottom:8px}
        header h1{font-size:clamp(1.6em,4vw,2.8em);font-weight:800;
            background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        header p{color:#8b8ba7;font-size:1em;margin-top:6px}

        /* Stats bar */
        .stats{display:flex;justify-content:center;gap:20px;padding:20px;flex-wrap:wrap;max-width:800px;margin:0 auto}
        .stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 24px;text-align:center;min-width:120px}
        .stat .num{font-size:1.6em;font-weight:700;color:#818cf8}
        .stat .lbl{font-size:0.8em;color:#6b6b8a;margin-top:2px}

        /* Tabs */
        .tabs{display:flex;justify-content:center;gap:4px;padding:10px 20px;max-width:600px;margin:0 auto}
        .tab{padding:10px 28px;border-radius:10px;font-size:0.95em;font-weight:500;cursor:pointer;transition:all .3s;
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:#8b8ba7}
        .tab:hover{background:rgba(99,102,241,0.1);border-color:rgba(99,102,241,0.2);color:#e4e4f0}
        .tab.active{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3);color:#818cf8}
        .tab .icon{margin-right:6px}

        /* Content panels */
        .panel{display:none;max-width:900px;margin:0 auto;padding:20px 20px 60px}
        .panel.active{display:block}

        /* Timeline (Research) */
        .tl{position:relative;padding:10px 0}
        .tl::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;
            background:linear-gradient(to bottom,transparent,rgba(99,102,241,0.3),rgba(99,102,241,0.3),transparent);transform:translateX(-50%)}
        .ti{display:flex;margin-bottom:30px;position:relative;opacity:0;animation:fi .6s ease forwards}
        .ti:nth-child(odd){animation-delay:.1s}.ti:nth-child(even){animation-delay:.2s}
        @keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .ti .d{width:120px;text-align:right;padding-right:30px;font-size:.85em;color:#6b6b8a;padding-top:20px;flex-shrink:0}
        .ti .d .dd{font-size:1.8em;font-weight:700;color:#818cf8;display:block}
        .ti .d .mm{font-size:.9em}
        .ti .dt{width:16px;height:16px;background:#818cf8;border-radius:50%;position:absolute;left:50%;top:24px;
            transform:translateX(-50%);border:3px solid #0a0a1a;box-shadow:0 0 20px rgba(99,102,241,0.4);z-index:2}
        .ti .dt.am{background:#fbbf24;box-shadow:0 0 20px rgba(251,191,36,0.4)}
        .ti .dt.pm{background:#818cf8;box-shadow:0 0 20px rgba(99,102,241,0.4)}
        .ti .c{flex:1;margin-left:30px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
            border-radius:14px;padding:20px 24px;transition:all .3s;cursor:pointer}
        .ti .c:hover{border-color:rgba(99,102,241,0.3);background:rgba(255,255,255,0.05);transform:translateY(-2px);box-shadow:0 8px 40px rgba(0,0,0,0.3)}
        .ti .c .tlbl{display:inline-block;font-size:.75em;padding:3px 12px;border-radius:12px;font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
        .tlbl.am{background:rgba(251,191,36,0.15);color:#fbbf24}
        .tlbl.pm{background:rgba(99,102,241,0.15);color:#818cf8}
        .ti .c .cnt{float:right;color:#6b6b8a;font-size:.85em}
        .ti .c h3{font-size:1.05em;font-weight:600;color:#e4e4f0;margin-bottom:4px}
        .ti .c .pv{color:#8b8ba7;font-size:.88em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .ti .c .rm{color:#818cf8;font-size:.82em;font-weight:500;margin-top:8px;display:inline-block}

        /* Script cards */
        .sc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:22px 26px;margin-bottom:20px;transition:all .3s;cursor:pointer}
        .sc:hover{border-color:rgba(251,191,36,0.25);transform:translateY(-2px);box-shadow:0 8px 40px rgba(0,0,0,0.3)}
        .sc .tlbl{display:inline-block;font-size:.75em;padding:3px 12px;border-radius:12px;font-weight:600;margin-bottom:8px;
            background:rgba(251,191,36,0.15);color:#fbbf24;text-transform:uppercase;letter-spacing:.5px}
        .sc h3{font-size:1.05em;font-weight:600;color:#e4e4f0;margin-bottom:4px}
        .sc .pv{color:#8b8ba7;font-size:.88em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .sc .rm{color:#fbbf24;font-size:.82em;font-weight:500;margin-top:8px;display:inline-block}

        .empty{text-align:center;padding:80px 20px;color:#6b6b8a}
        .empty span{font-size:3em;display:block;margin-bottom:16px}
        .empty h3{color:#8b8ba7;font-weight:500}
        .empty p{margin-top:8px;font-size:.9em}

        footer{text-align:center;padding:30px 20px;color:#5a5a7a;font-size:.82em;border-top:1px solid rgba(255,255,255,0.04)}
        footer a{color:#818cf8;text-decoration:none}
        footer a:hover{text-decoration:underline}

        @media(max-width:768px){
            .tl::before{left:20px}.ti{flex-direction:column;padding-left:50px}
            .ti .d{width:auto;text-align:left;padding-right:0;padding-top:0;margin-bottom:6px}
            .ti .d .dd{display:inline;font-size:1.2em;margin-right:4px}
            .ti .d .mm{display:inline}
            .ti .dt{left:20px;top:18px;width:12px;height:12px}
            .ti .c{margin-left:0;padding:16px 18px}
            .stats{gap:12px}.stat{padding:10px 16px;min-width:80px}.stat .num{font-size:1.3em}
            .tab{padding:8px 16px;font-size:.85em}
        }
    </style>
</head>
<body>
    <div class="bg"><div class="bg-grid"></div><div class="g1"></div><div class="g2"></div></div>

    <!-- HEADER -->
    <header>
        <span class="logo">📚</span>
        <h1>Speed Reading Insights</h1>
        <p>Nghiên cứu & Kịch bản Video mỗi ngày</p>
    </header>

    <!-- STATS -->
    <div class="stats" id="stats">
        <div class="stat"><div class="num" id="s1">0</div><div class="lbl">Báo cáo</div></div>
        <div class="stat"><div class="num" id="s2">0</div><div class="lbl">Kịch bản</div></div>
        <div class="stat"><div class="num" id="s3">0</div><div class="lbl">Tổng mục</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('research')"><span class="icon">📚</span>Nghiên cứu</div>
        <div class="tab" onclick="switchTab('scripts')"><span class="icon">🎬</span>Kịch bản Video</div>
    </div>

    <!-- PANEL: Research -->
    <div class="panel active" id="panel-research">
        <div class="tl" id="research-timeline"></div>
    </div>

    <!-- PANEL: Scripts -->
    <div class="panel" id="panel-scripts">
        <div id="scripts-list"></div>
    </div>

    <footer>
        <p>© 2026 <a href="https://speedreading.vn">Speed Reading Việt Nam</a> — Hotline: 0899.320.202</p>
    </footer>

    <script>
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`.tab:nth-child(${name==='research'?1:2})`).classList.add('active');
            document.getElementById(`panel-${name}`).classList.add('active');
        }

        function renderTimeline(data, containerId) {
            const c = document.getElementById(containerId);
            if (!data || data.length === 0) {
                c.innerHTML = '<div class="empty"><span>📬</span><h3>Chưa có báo cáo nào</h3><p>Báo cáo đầu tiên sẽ xuất hiện ở đây</p></div>';
                return;
            }
            const s = [...data].sort((a,b) => {
                const dA = new Date(a.date.split('/').reverse().join('-'));
                const dB = new Date(b.date.split('/').reverse().join('-'));
                return dA !== dB ? dB - dA : (b.time === 'sáng' ? 1 : -1);
            });
            c.innerHTML = s.map((r,i) => {
                const am = r.time === 'sáng';
                const pv = r.items ? r.items.slice(0,2).map(x => x.title).join(' • ') : '';
                return `<div class="ti" style="flex-direction:${i%2===0?'row':'row-reverse'}">
                    <div class="d"><span class="dd">${r.day}</span><span class="mm">${r.month}</span></div>
                    <div class="dt ${am?'am':'pm'}"></div>
                    <div class="c" onclick="window.location.href='reports/${r.filename}'">
                        <span class="tlbl ${am?'am':'pm'}">${am?'🌅 Sáng':'🌆 Tối'}</span>
                        <span class="cnt">📌 ${r.items.length} mục</span>
                        <h3>${r.title}</h3>
                        <p class="pv">${pv}</p>
                        <span class="rm">Đọc thêm →</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderScripts(data, containerId) {
            const c = document.getElementById(containerId);
            if (!data || data.length === 0) {
                c.innerHTML = '<div class="empty"><span>🎬</span><h3>Chưa có kịch bản nào</h3><p>Kịch bản mới sẽ xuất hiện ở đây mỗi sáng</p></div>';
                return;
            }
            const s = [...data].sort((a,b) => {
                const dA = new Date(a.date.split('/').reverse().join('-'));
                const dB = new Date(b.date.split('/').reverse().join('-'));
                return dB - dA;
            });
            c.innerHTML = s.map(r => {
                const pv = r.items ? r.items.slice(0,1).map(x => x.title).join('') : '';
                return `<div class="sc" onclick="window.location.href='scripts/${r.filename}'">
                    <span class="tlbl">🎬 Kịch bản</span>
                    <h3>${r.title}</h3>
                    <p class="pv">${pv}</p>
                    <span class="rm">Xem kịch bản →</span>
                </div>`;
            }).join('');
        }

        // Load data
        Promise.all([
            fetch('reports.json').then(r => r.json()).catch(() => []),
            fetch('scripts.json').then(r => r.json()).catch(() => [])
        ]).then(([reports, scripts]) => {
            renderTimeline(reports, 'research-timeline');
            renderScripts(scripts, 'scripts-list');
            
            document.getElementById('s1').textContent = reports.length;
            document.getElementById('s2').textContent = scripts.length;
            
            const totalItems = (reports.reduce((s,r) => s + (r.items?r.items.length:0), 0) +
                               scripts.reduce((s,r) => s + (r.items?r.items.length:0), 0));
            document.getElementById('s3').textContent = totalItems;
        });
    </script>
</body>
</html>
